<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> /* keeps your glass‑blur look */ 
    body{background:url('{{url_for('static',filename='register_photo.jpg')}}') center/cover no-repeat;height:100vh;display:flex;align-items:center;justify-content:center;margin:0}
    .overlay{position:fixed;inset:0;backdrop-filter:blur(6px)}
    .card{z-index:1;border-radius:20px;box-shadow:0 4px 10px rgba(0,0,0,.3);background:rgba(255,255,255,.9);padding:30px}
    .btn-primary{background:linear-gradient(45deg,#ff5733,#ff8c00);border:none;font-weight:bold}
    .btn-primary:hover{background:linear-gradient(45deg,#e64a19,#ff6500)}
  </style>
</head>
<body>
<div class="overlay"></div>
<div class="card" style="width:clamp(300px,90vw,450px)">
  <h2 class="text-center text-danger mb-3">Forgot Password</h2>

  {% with msgs = get_flashed_messages(with_categories=True) %}
    {% for cat,msg in msgs %}
      <div class="alert alert-{{cat}}">{{msg}}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{url_for('forgot_password')}}">
    <label class="form-label">Enter Your Email</label>
    <input type="email" class="form-control mb-3" name="email" required>
    <button class="btn btn-primary btn-lg w-100">Send Reset Link</button>
  </form>

  <p class="text-center mt-3">Remembered? <a href="{{url_for('login')}}">Login</a></p>
</div>
</body>
</html>
