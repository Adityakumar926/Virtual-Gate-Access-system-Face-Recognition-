<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:url('{{url_for('static',filename='register_photo.jpg')}}') center/cover no-repeat;height:100vh;display:flex;align-items:center;justify-content:center;margin:0}
    .overlay{position:fixed;inset:0;backdrop-filter:blur(6px)}
    .card{z-index:1;border-radius:20px;box-shadow:0 4px 10px rgba(0,0,0,.3);background:rgba(255,255,255,.9);padding:30px}
    .btn-primary{background:linear-gradient(45deg,#28a745,#00c853);border:none;font-weight:bold}
    .btn-primary:hover{background:linear-gradient(45deg,#218838,#008c46)}
  </style>
</head>
<body>
<div class="overlay"></div>
<div class="card" style="width:clamp(300px,90vw,450px)">
  <h2 class="text-center text-danger mb-3">Reset Password</h2>

  {% with msgs = get_flashed_messages(with_categories=True) %}
    {% for cat,msg in msgs %}
      <div class="alert alert-{{cat}}">{{msg}}</div>
    {% endfor %}
  {% endwith %}

  <!-- ‘action=""’ posts to the same /reset_password/<token> URL -->
  <form method="POST">
    <label class="form-label">New Password</label>
    <input type="password" class="form-control mb-3" name="password" required>

    <label class="form-label">Confirm Password</label>
    <input type="password" class="form-control mb-4" name="confirm_password" required>

    <button class="btn btn-primary btn-lg w-100">Reset Password</button>
  </form>

  <p class="text-center mt-3">Back to <a href="{{url_for('login')}}">login</a></p>
</div>
</body>
</html>
