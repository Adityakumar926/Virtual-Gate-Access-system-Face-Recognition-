<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <style>
      body {
        background-image: url('{{ url_for('static', filename='login_photo.jpg') }}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(2px);
        z-index: 0;
      }

      .card {
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        background: rgba(255, 255, 255, 0.9);
        z-index: 1;
        position: relative;
        padding: 30px;
      }

      .btn-primary {
        background: linear-gradient(45deg, #0b81e2, #00c6ff);
        border: none;
        font-weight: bold;
      }

      .btn-primary:hover {
        background: linear-gradient(45deg, #1837e6, #008cff);
      }

      .form-control {
        border-radius: 10px;
      }

      .text-primary {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="overlay"></div>
    <div class="card" style="width: 100%; max-width: 450px;">
      <h2 class="text-center text-primary">Login</h2>
      <form method="POST" action="/login">
        <div class="mb-3">
          <label for="username" class="form-label">Username or Email</label>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username or email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
        </div>
      </form>
      <div class="text-center mt-3">
        <p>Don't have an account? <a href="/register" class="text-primary">Register here</a></p>
        <p><a href="/forgot_password" class="text-danger">Forgot Password?</a></p>
      </div>
    </div>
  </body>
</html>
